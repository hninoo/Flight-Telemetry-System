services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flight-telemetry
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=
      - APP_URL=http://localhost:8000
      - CACHE_STORE=array
      - QUEUE_CONNECTION=sync
      - LOG_CHANNEL=stderr
    volumes:
      - ./storage:/app/storage
    restart: unless-stopped